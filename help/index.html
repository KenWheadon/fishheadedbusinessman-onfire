<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Integration</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
        }
        /* Temporary button to trigger the canvas UI */
        #game-ui {
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <h2>Main Game Engine Render Space</h2>
        <button id="btn-help">Show Help Carousel</button>
    </div>

    <script src="HelpCarousel.js"></script>
    
    <script>
        // Instantiate the UI class
        const helpUI = new HelpCarousel();
        
        // Mount it to the body (it uses fixed positioning and z-index to overlay)
        helpUI.mount('game-ui');

        // Bind your game's trigger to the show function
        document.getElementById('btn-help').addEventListener('click', () => {
            helpUI.show();
        });
    </script>
</body>
</html>
