<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modular Carrot Cutter Layout Tester</title>
  <style>
    body {
      margin: 0;
      background: #121216;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #e2e8f0;
      overflow: hidden;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #ff8a00;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #workspace {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      background: #1a1a24;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      border: 1px solid #2d2d3d;
    }

    #canvas-holder {
      position: relative;
      background: #0d0d11;
      border-radius: 10px;
      border: 2px solid #3f3f50;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #sidebar {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 250px;
    }

    .card {
      background: #252538;
      border: 1px solid #32324d;
      padding: 15px;
      border-radius: 10px;
    }

    .card-title {
      font-weight: bold;
      color: #94a3b8;
      margin-bottom: 10px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .stat span {
      font-weight: bold;
      color: #f39c12;
    }

    button {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      background: #e67e22;
      border: none;
      border-bottom: 4px solid #d35400;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button#cut-btn {
      background: #e67e22;
      border-bottom-color: #d35400;
    }
    
    button#cut-btn.unlocked {
      background: #2ecc71 !important;
      border-bottom-color: #27ae60 !important;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.5); }
      70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
      100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
    }

    button:hover {
      background: #f39c12;
      border-bottom-color: #e67e22;
    }

    button:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }

    #reset-btn {
      background: #475569;
      border-bottom-color: #334155;
    }

    #reset-btn:hover {
      background: #64748b;
      border-bottom-color: #475569;
    }

    .debug-coords {
      font-family: monospace;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>

  <h1>Modular Carrot Cutter Widget</h1>

  <div id="workspace">
    <div id="canvas-holder">
      <canvas id="main-canvas" width="800" height="600"></canvas>
    </div>

    <div id="sidebar">
      <div class="card">
        <div class="card-title">Live Controls</div>
        <button id="cut-btn" style="width: 100%; margin-bottom: 10px;">🔓 UNLOCK CARROT CUT</button>
        <button id="reset-btn" style="width: 100%;">🔄 RESET COMPONENT</button>
      </div>

      <div class="card">
        <div class="card-title">Widget Metrics</div>
        <div class="stat">Block Position: <span>(50, 50) px</span></div>
        <div class="stat">Block Bounds: <span>700 x 500 px</span></div>
        <div class="stat">Uncut Carrots: <span id="count">5</span></div>
      </div>

      <div class="card">
        <div class="card-title">Local Translation Debug</div>
        <div class="debug-coords">Pointer Local X: <span id="local-x">0</span></div>
        <div class="debug-coords">Pointer Local Y: <span id="local-y">0</span></div>
      </div>
    </div>
  </div>

  <script src="carrot.js"></script>
  
  <script>
    // 1. Dynamic Asset Manager Setup
    const AssetManager = {
      assets: {},
      get(key) {
        return this.assets[key];
      },
      load(key, src) {
        const img = new Image();
        img.src = src;
        img.onload = () => console.log(`Asset "${key}" loaded successfully.`);
        img.onerror = () => console.warn(`Asset "${key}" failed to load. Drawing fallback graphics.`);
        this.assets[key] = img;
        return img;
      }
    };

    // Preload base compost and all 5 distinct top graphics
    AssetManager.load('base', 'images/carrot-base.png');
    AssetManager.load('top1', 'images/carrot-1.png');
    AssetManager.load('top2', 'images/carrot-2.png');
    AssetManager.load('top3', 'images/carrot-3.png');
    AssetManager.load('top4', 'images/carrot-4.png');
    AssetManager.load('top5', 'images/carrot-5.png');

    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');

    const cutBtn = document.getElementById('cut-btn');
    const resetBtn = document.getElementById('reset-btn');
    const countSpan = document.getElementById('count');
    const localXSpan = document.getElementById('local-x');
    const localYSpan = document.getElementById('local-y');

    const widgetConfig = {
      offsetX: 50,    
      offsetY: 50,
      width: 700,     
      height: 500
    };

    const gameComponent = new CarrotCutter({
      width: widgetConfig.width,
      height: widgetConfig.height
    });

    const updateDisplay = () => {
      countSpan.textContent = gameComponent.checkCut();
      
      if (gameComponent.isLocked) {
        cutBtn.textContent = "🔓 UNLOCK CARROT CUT";
        cutBtn.classList.remove('unlocked');
      } else {
        cutBtn.textContent = "✨ SELECT A CARROT TO CUT";
        cutBtn.classList.add('unlocked');
      }
    };

    const getLocalCoords = (e) => {
      const rect = canvas.getBoundingClientRect();
      const parentX = e.clientX - rect.left;
      const parentY = e.clientY - rect.top;
      
      const localX = parentX - widgetConfig.offsetX;
      const localY = parentY - widgetConfig.offsetY;
      
      return { localX, localY };
    };

    canvas.addEventListener('mousemove', (e) => {
      const { localX, localY } = getLocalCoords(e);
      localXSpan.textContent = Math.round(localX);
      localYSpan.textContent = Math.round(localY);
      gameComponent.handleMouseMove(localX, localY);
    });

    canvas.addEventListener('click', (e) => {
      const { localX, localY } = getLocalCoords(e);
      gameComponent.handleMouseClick(localX, localY);
      updateDisplay(); 
    });

    cutBtn.addEventListener('click', () => {
      gameComponent.unlock();
      updateDisplay();
    });

    resetBtn.addEventListener('click', () => {
      gameComponent.reset();
      updateDisplay();
    });

    let lastTime = performance.now();

    function gameLoop(currentTime) {
      const elapsed = currentTime - lastTime;
      lastTime = currentTime;

      const dt = elapsed / 16.667;

      gameComponent.update(dt);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#1e1e26';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = '#e67e22';
      ctx.lineWidth = 1;
      ctx.setLineDash([6, 4]);
      ctx.strokeRect(
        widgetConfig.offsetX - 2, 
        widgetConfig.offsetY - 2, 
        widgetConfig.width + 4, 
        widgetConfig.height + 4
      );
      ctx.setLineDash([]); 

      ctx.fillStyle = '#64748b';
      ctx.font = '10px monospace';
      ctx.fillText(`LAYOUT PARENT BLOCK AT: (X:${widgetConfig.offsetX}, Y:${widgetConfig.offsetY})`, 10, 24);

      // Draw the component layer
      gameComponent.draw(ctx, widgetConfig.offsetX, widgetConfig.offsetY);

      requestAnimationFrame(gameLoop);
    }

    updateDisplay();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
