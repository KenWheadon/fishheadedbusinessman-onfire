<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modular Carrot Cutter Layout Tester</title>
  <style>
    body {
      margin: 0;
      background: #121216;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #e2e8f0;
      overflow: hidden;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #ff8a00;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    #workspace {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      background: #1a1a24;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      border: 1px solid #2d2d3d;
    }

    /* Target Game Container: Simulated Flex/Grid layout block context */
    #canvas-holder {
      position: relative;
      background: #0d0d11;
      border-radius: 10px;
      border: 2px solid #3f3f50;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #sidebar {
      display: flex;
      flex-direction: column;
      gap: 15px;
      width: 250px;
    }

    .card {
      background: #252538;
      border: 1px solid #32324d;
      padding: 15px;
      border-radius: 10px;
    }

    .card-title {
      font-weight: bold;
      color: #94a3b8;
      margin-bottom: 10px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat {
      font-size: 14px;
      margin-bottom: 6px;
    }

    .stat span {
      font-weight: bold;
      color: #f39c12;
    }

    button {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: bold;
      color: #fff;
      background: #e67e22;
      border: none;
      border-bottom: 4px solid #d35400;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      background: #f39c12;
      border-bottom-color: #e67e22;
    }

    button:active {
      transform: translateY(2px);
      border-bottom-width: 2px;
    }

    #reset-btn {
      background: #475569;
      border-bottom-color: #334155;
    }

    #reset-btn:hover {
      background: #64748b;
      border-bottom-color: #475569;
    }

    .debug-coords {
      font-family: monospace;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>
<body>

  <h1>Modular Carrot Cutter Widget</h1>

  <div id="workspace">
    <!-- Parent owned layout Canvas container -->
    <div id="canvas-holder">
      <canvas id="main-canvas" width="800" height="600"></canvas>
    </div>

    <!-- Sidebar UI elements and layout configuration -->
    <div id="sidebar">
      <div class="card">
        <div class="card-title">Live Controls</div>
        <button id="cut-btn" style="width: 100%; margin-bottom: 10px;">🔪 CUT CARROT</button>
        <button id="reset-btn" style="width: 100%;">🔄 RESET COMPONENT</button>
      </div>

      <div class="card">
        <div class="card-title">Widget Metrics</div>
        <div class="stat">Block Position: <span>(50, 50) px</span></div>
        <div class="stat">Block Bounds: <span>700 x 500 px</span></div>
        <div class="stat">Uncut Carrots: <span id="count">5</span></div>
      </div>

      <div class="card">
        <div class="card-title">Local Translation Debug</div>
        <div class="debug-coords">Pointer Local X: <span id="local-x">0</span></div>
        <div class="debug-coords">Pointer Local Y: <span id="local-y">0</span></div>
      </div>
    </div>
  </div>

  <!-- Include the decoupled carrot.js component script -->
  <script src="carrot.js"></script>
  
  <script>
    // 1. Decoupled Global Asset Pipeline Setup
    const AssetManager = {
      assets: {},
      get(key) {
        return this.assets[key];
      },
      load(key, src) {
        const img = new Image();
        img.src = src;
        img.onload = () => console.log(`Asset "${key}" preloaded successfully.`);
        img.onerror = () => console.warn(`Failed to preload "${key}", utilizing procedural fallback.`);
        this.assets[key] = img;
        return img;
      }
    };

    // Preload required assets (fallback to procedural rendering occurs gracefully if paths fail)
    AssetManager.load('hub', 'images/image1.png');
    AssetManager.load('bottom', 'images/carrot-bottom.png');
    AssetManager.load('top', 'images/carrot-top.png');

    // 2. Initialize parent canvas context
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');

    // UI elements references
    const cutBtn = document.getElementById('cut-btn');
    const resetBtn = document.getElementById('reset-btn');
    const countSpan = document.getElementById('count');
    const localXSpan = document.getElementById('local-x');
    const localYSpan = document.getElementById('local-y');

    // 3. Define offset block metrics to demonstrate offset-space drawing and clipping
    const widgetConfig = {
      offsetX: 50,    // Top-left margins relative to parent canvas
      offsetY: 50,
      width: 700,     // Confined widget bounds (respects container margins)
      height: 500
    };

    // Instantiate game component strictly with a dimensional config object
    const gameComponent = new CarrotCutter({
      width: widgetConfig.width,
      height: widgetConfig.height
    });

    const updateDisplay = () => {
      countSpan.textContent = gameComponent.checkCut();
    };

    // 4. Standard coordinate translations to local component coordinates
    const getLocalCoords = (e) => {
      const rect = canvas.getBoundingClientRect();
      const parentX = e.clientX - rect.left;
      const parentY = e.clientY - rect.top;
      
      // Map global parent space to relative local layout box space
      const localX = parentX - widgetConfig.offsetX;
      const localY = parentY - widgetConfig.offsetY;
      
      return { localX, localY };
    };

    // Capture and translate mouse coordinates
    canvas.addEventListener('mousemove', (e) => {
      const { localX, localY } = getLocalCoords(e);
      localXSpan.textContent = Math.round(localX);
      localYSpan.textContent = Math.round(localY);
      gameComponent.handleMouseMove(localX, localY);
    });

    canvas.addEventListener('click', (e) => {
      const { localX, localY } = getLocalCoords(e);
      gameComponent.handleMouseClick(localX, localY);
      updateDisplay();
    });

    cutBtn.addEventListener('click', () => {
      gameComponent.cut();
      updateDisplay();
    });

    resetBtn.addEventListener('click', () => {
      gameComponent.reset();
      updateDisplay();
    });

    // 5. Parent-driven Game Loop with Delta-time calculations
    let lastTime = performance.now();

    function gameLoop(currentTime) {
      const elapsed = currentTime - lastTime;
      lastTime = currentTime;

      // Normalized dt (1 unit = 16.67ms)
      const dt = elapsed / 16.667;

      // Component updates physics/logic 
      gameComponent.update(dt);

      // Clean Parent Canvas Context Layer
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // --- Draw Environment Background Layer ---
      ctx.fillStyle = '#1e1e26';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // --- Draw Host Layout Bounds & Guide Lines ---
      ctx.strokeStyle = '#e67e22';
      ctx.lineWidth = 1;
      ctx.setLineDash([6, 4]);
      ctx.strokeRect(
        widgetConfig.offsetX - 2, 
        widgetConfig.offsetY - 2, 
        widgetConfig.width + 4, 
        widgetConfig.height + 4
      );
      ctx.setLineDash([]); // Reset dash

      // Decorative layout description text
      ctx.fillStyle = '#64748b';
      ctx.font = '10px monospace';
      ctx.fillText(`LAYOUT PARENT BLOCK AT: (X:${widgetConfig.offsetX}, Y:${widgetConfig.offsetY})`, 10, 24);

      // --- Draw Modular Component Layer at target layout coordinates ---
      gameComponent.draw(ctx, widgetConfig.offsetX, widgetConfig.offsetY);

      requestAnimationFrame(gameLoop);
    }

    // Initialize display and trigger timing loop
    updateDisplay();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
