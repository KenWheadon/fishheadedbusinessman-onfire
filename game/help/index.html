<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decoupled Modular Canvas Demo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: #f1f2f6;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            color: #00d8d6;
            margin: 0 0 10px 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Flex Layout demonstrating that the canvas is a layout block */
        #app-layout {
            display: flex;
            flex-direction: row;
            width: 90vw;
            height: 80vh;
            background-color: #141923;
            border: 2px solid #232a38;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            overflow: hidden;
        }

        #control-panel {
            flex: 1;
            min-width: 250px;
            max-width: 350px;
            background-color: #1a202c;
            border-right: 2px solid #232a38;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* The modular canvas container styled as a flex item */
        #canvas-block {
            flex: 2;
            position: relative;
            background-color: #0d1117;
            display: flex;
            align-items: stretch;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .btn {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(135deg, #00d8d6, #0056f7);
            color: white;
            border: none;
            border-radius: 12px;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 5px 15px rgba(0, 216, 214, 0.3);
        }

        .btn:hover {
            transform: scale(1.03) translateY(-1px);
            box-shadow: 0 8px 25px rgba(0, 216, 214, 0.5);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .description {
            font-size: 14px;
            color: #8a97a7;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            background-color: #2f3640;
            color: #00d8d6;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="app-layout">
        <div id="control-panel">
            <div>
                <span class="badge">LAYOUT WRAPPER</span>
                <h1>Decoupled Canvas Engine</h1>
                <p class="description">
                    This component is no longer full-screen. It is rendered inside a decoupled <strong>Canvas container block</strong>. 
                    Input coordinates are translated relative to the canvas offset, and the paint pipeline respects the bounds dynamically during page resize.
                </p>
            </div>
            <button class="btn" id="btn-help">Open Manual</button>
        </div>

        <!-- This block handles standard layout properties and lets the Canvas scale to fill it -->
        <div id="canvas-block">
            <canvas id="game-canvas"></canvas>
        </div>
    </div>

    <script src="HelpCarousel.js"></script>
    <script>
        // =====================================================================
        // GLOBAL ASSET MANAGER MOCK
        // Satisfies Constraint 4: Generates high-fidelity mock assets dynamically
        // =====================================================================
        const AssetManager = {
            assets: {},
            get(key) {
                return this.assets[key];
            },
            initMockPages(count) {
                const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#9b59b6'];
                for (let i = 1; i <= count; i++) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400;
                    canvas.height = 300;
                    const ctx = canvas.getContext('2d');
                    
                    // Tech backdrop pattern
                    const grad = ctx.createLinearGradient(0, 0, 400, 300);
                    grad.addColorStop(0, '#11141c');
                    grad.addColorStop(1, colors[i - 1] || '#00d8d6');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 400, 300);

                    // Sci-fi UI lines
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.lineWidth = 1;
                    for (let x = 0; x < 400; x += 30) {
                        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 300); ctx.stroke();
                    }

                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 24px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(`MOCK GRAPHIC - STEP ${i}`, 200, 150);

                    const img = new Image();
                    img.src = canvas.toDataURL();
                    this.assets[`page-${i}`] = img;
                }
            }
        };

        // Initialize mock manual graphics
        AssetManager.initMockPages(5);

        // =====================================================================
        // ORCHESTRATION ENGINE (Main Thread Loops and Input Delegation)
        // =====================================================================
        const container = document.getElementById('canvas-block');
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        // Instantiate component utilizing local configuration bounds
        const helpUI = new HelpCarousel({
            width: container.clientWidth,
            height: container.clientHeight
        });

        // Track and coordinate dimension updates
        function syncContainerSize() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            helpUI.resize(rect.width, rect.height);
        }

        window.addEventListener('resize', syncContainerSize);
        syncContainerSize();

        // Localized input translations & Event passing (Constraint 3)
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const localX = e.clientX - rect.left;
            const localY = e.clientY - rect.top;
            helpUI.handleMouseMove(localX, localY);
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const localX = e.clientX - rect.left;
            const localY = e.clientY - rect.top;
            helpUI.handleMouseClick(localX, localY);
        });

        window.addEventListener('keydown', (e) => {
            helpUI.handleKeyDown(e.key);
        });

        document.getElementById('btn-help').addEventListener('click', () => {
            helpUI.show();
        });

        // =====================================================================
        // GAME RENDER TIMELINE (Simulation)
        // =====================================================================
        // Simple background system drawing inside the canvas to show layer transparency
        const particles = Array.from({ length: 40 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 50,
            vy: (Math.random() - 0.5) * 50,
            radius: Math.random() * 3 + 1
        }));

        function drawBackgroundSimulation(dt) {
            ctx.fillStyle = '#0f131a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Connective space mesh logic
            ctx.strokeStyle = 'rgba(0, 216, 214, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.x = (p.x + p.vx * dt + canvas.width) % canvas.width;
                p.y = (p.y + p.vy * dt + canvas.height) % canvas.height;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 216, 214, 0.3)';
                ctx.fill();

                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Single Master Animation clock loop orchestrating ticks (Constraint 1)
        let lastTime = performance.now();
        function tick(now) {
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            // Step 1: Render background elements
            drawBackgroundSimulation(dt);

            // Step 2: Feed tick down to localized component (Constraint 2)
            helpUI.update(dt);

            // Step 3: Draw localized component inside coordinates
            helpUI.draw(ctx, 0, 0);

            requestAnimationFrame(tick);
        }

        requestAnimationFrame(tick);
    </script>
</body>
</html>
