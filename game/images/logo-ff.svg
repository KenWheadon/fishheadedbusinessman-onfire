<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <filter id="cyber-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur1" />
      <feGaussianBlur stdDeviation="12" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(100, 100)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- 1. CYAN BACKING LAYER -->
    <g stroke="#00f3ff" stroke-width="10" filter="url(#cyber-glow)" opacity="0.8" transform="translate(-1, 1)">
      <!-- Crossed Bone -->
      <g transform="rotate(-45)">
        <path d="M 0 -40 L 0 40" />
        <circle cx="-7" cy="-40" r="6" />
        <circle cx="-7" cy="40" r="6" />
      </g>
      <!-- Crossed Butcher Knife -->
      <g transform="rotate(45)">
        <path d="M 0 10 L 0 42 M -6 8 L 6 8" />
        <path d="M -16 8 L 6 8 L 6 -38 L -6 -38 L -16 -26 Z" />
        <circle cx="-2" cy="-24" r="2.5" />
      </g>
    </g>
    
    <!-- 2. HOT PINK CHROMATIC LAYER -->
    <g stroke="#ff007f" stroke-width="7" filter="url(#cyber-glow)" opacity="0.9" transform="translate(1, -1)">
      <!-- Crossed Bone -->
      <g transform="rotate(-45)">
        <path d="M 0 -40 L 0 40" />
        <circle cx="-7" cy="-40" r="6" />
        <circle cx="-7" cy="40" r="6" />
      </g>
      <!-- Crossed Butcher Knife -->
      <g transform="rotate(45)">
        <path d="M 0 10 L 0 42 M -6 8 L 6 8" />
        <path d="M -16 8 L 6 8 L 6 -38 L -6 -38 L -16 -26 Z" />
        <circle cx="-2" cy="-24" r="2.5" />
      </g>
    </g>

    <!-- 3. CRISP WHITE CORE LAYER -->
    <g stroke="#ffffff" stroke-width="3.5">
      <!-- Crossed Bone -->
      <g transform="rotate(-45)">
        <path d="M 0 -40 L 0 40" />
        <circle cx="-7" cy="-40" r="6" />
        <circle cx="-7" cy="40" r="6" />
      </g>
      <!-- Crossed Butcher Knife -->
      <g transform="rotate(45)">
        <path d="M 0 10 L 0 42 M -6 8 L 6 8" />
        <path d="M -16 8 L 6 8 L 6 -38 L -6 -38 L -16 -26 Z" />
        <circle cx="-2" cy="-24" r="2.5" />
      </g>
    </g>
  </g>
</svg>
