<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Popup Sandbox</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        #wrapper {
            text-align: center;
        }
        canvas {
            background-color: #1e1e1e;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            display: block;
        }
        .instructions {
            color: #888;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="instructions">
            Drag the sliders • Click buttons to test callbacks • Close to test pop-out animation
        </div>
    </div>

    <!-- Loading the modular decoupled component -->
    <script src="SettingsPopup.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Layout Configuration Properties (Simulating flex/block alignment)
        const blockLayout = {
            x: 170,
            y: 100,
            width: 460,
            height: 400
        };

        // Global mouse state tracker for continuous sliders
        let isMouseDown = false;

        // Initialize the modular UI Block with layout metrics and callbacks
        const settingsPopup = new SettingsPopup({
            width: blockLayout.width,
            height: blockLayout.height
        }, {
            onAchievements: () => {
                console.log('%c🏆 Achievements Clicked!', 'color: #FF9800; font-weight: bold;');
            },
            onHelp: () => {
                console.log('%cℹ️ Help Clicked!', 'color: #4CAF50; font-weight: bold;');
            },
            onCredits: () => {
                console.log('%c🎬 Credits Clicked!', 'color: #2196F3; font-weight: bold;');
            },
            onClose: () => {
                console.log('%c❌ Popup Closed!', 'color: #e81123; font-weight: bold;');
            },
            onVolumeChange: (type, value) => {
                console.log(`Volume [${type.toUpperCase()}]: ${Math.round(value * 100)}%`);
            }
        });

        // Open the popup immediately on load
        settingsPopup.show();

        // Precision Timing Engine Loop
        let lastTime = performance.now();

        function loop(timestamp) {
            // Calculate actual frame-rate independent delta time in seconds
            const dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            // Clear the canvas viewport
            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawGridBackground();

            // Run updates & drawing steps within structural layout conditions
            if (!settingsPopup.isoffscreen()) {
                settingsPopup.update(dt);
                settingsPopup.draw(ctx, blockLayout.x, blockLayout.y);
            } else {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.font = '20px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Click inside the dashed layout boundary to reopen settings!', canvas.width / 2, canvas.height / 2);
            }

            requestAnimationFrame(loop);
        }

        // Helper to draw reference grid alignment lines and layout container block
        function drawGridBackground() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            const gridSize = 40;
            
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Render visual block container boundary helper
            ctx.strokeStyle = 'rgba(33, 150, 243, 0.25)';
            ctx.lineWidth = 2;
            ctx.setLineDash([4, 4]);
            ctx.strokeRect(blockLayout.x, blockLayout.y, blockLayout.width, blockLayout.height);
            ctx.setLineDash([]);
        }

        // Transform global canvas screen space to localized component layout space
        function getLocalCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const canvasX = e.clientX - rect.left;
            const canvasY = e.clientY - rect.top;

            return {
                x: canvasX - blockLayout.x,
                y: canvasY - blockLayout.y
            };
        }

        // Pointer event listeners routing local coordinates to the component
        canvas.addEventListener('mousemove', (e) => {
            const local = getLocalCoordinates(e);
            settingsPopup.handleMouseMove(local.x, local.y, isMouseDown);
            canvas.style.cursor = settingsPopup.getCursorStyle();
        });

        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            const local = getLocalCoordinates(e);

            if (settingsPopup.isoffscreen()) {
                // Intercept layout bounds to reopen component if clicked within layout container
                if (local.x >= 0 && local.x <= blockLayout.width && local.y >= 0 && local.y <= blockLayout.height) {
                    settingsPopup.show();
                }
            } else {
                settingsPopup.handleMouseDown(local.x, local.y);
            }
        });

        window.addEventListener('mouseup', () => {
            isMouseDown = false;
            settingsPopup.handleMouseUp();
        });

        // Initialize Timing Engine
        requestAnimationFrame((timestamp) => {
            lastTime = timestamp;
            requestAnimationFrame(loop);
        });
    </script>
</body>
</html>
