<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Popup Testbed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #11111b;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #cdd6f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #f5c2e7;
        }

        p {
            margin: 0 0 20px 0;
            color: #a6adc8;
            font-size: 0.95rem;
        }

        /* Responsive, Flex-friendly Canvas Container */
        .viewport-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-color: #181825;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border: 2px solid #313244;
        }

        canvas {
            display: block;
            border-radius: 8px;
            background-color: #11111b;
            image-rendering: pixelated;
        }

        button.trigger-btn {
            background-color: #cba6f7;
            color: #11111b;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s ease;
            box-shadow: 0 4px 15px rgba(203, 166, 247, 0.3);
            align-self: center;
        }

        button.trigger-btn:hover {
            background-color: #f5c2e7;
            transform: scale(1.05);
        }

        button.trigger-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>Game Engine UI Test</h1>
    <p>The popup is now a modular UI block updating inside a shared canvas game context.</p>

    <div class="viewport-wrapper">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
        <button class="trigger-btn" id="triggerBtn">Open Quest Dialogue</button>
    </div>

    <script src="GamePopup.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const triggerButton = document.getElementById('triggerBtn');

            // --- Pre-loaded Assets Strategy ---
            const placeholderImg = new Image();
            placeholderImg.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23f5c2e7'/><circle cx='50' cy='50' r='30' fill='%2311111b'/></svg>";

            // --- Instantiate decoupled component ---
            const popupWidth = 500;
            const popupHeight = 250;
            const popup = new GamePopup({ width: popupWidth, height: popupHeight });

            // Calculate centering translation coordinates inside our canvas layout space
            const popupX = (canvas.width - popupWidth) / 2;
            const popupY = (canvas.height - popupHeight) / 2;

            // Trigger click integration
            triggerButton.addEventListener('click', () => {
                popup.show(
                    "Great job traveler! You have successfully configured your custom canvas UI system. Proceed onward!", 
                    placeholderImg, 
                    () => {
                        console.log("Popup Transition Complete Callback Executed!");
                    }
                );
            });

            // --- Input Translation layer ---
            function getComponentCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                
                // Convert viewport coordinates to canvas coordinates
                const canvasX = (e.clientX - rect.left) * scaleX;
                const canvasY = (e.clientY - rect.top) * scaleY;

                // Subtract component position offset to retrieve component-local relative coords
                return {
                    x: canvasX - popupX,
                    y: canvasY - popupY
                };
            }

            canvas.addEventListener('mousemove', (e) => {
                const local = getComponentCoordinates(e);
                popup.handleMouseMove(local.x, local.y);
            });

            canvas.addEventListener('click', (e) => {
                const local = getComponentCoordinates(e);
                popup.handleMouseClick(local.x, local.y);
            });

            // --- Game/Master Loop Setup ---
            let lastTime = performance.now();
            let starsOffset = 0; // Simulated game background animation

            function loop() {
                const now = performance.now();
                const dt = (now - lastTime) / 1000;
                lastTime = now;

                // 1. UPDATE SYSTEM STATE
                starsOffset = (starsOffset + dt * 40) % 80; // Pan star background
                popup.update(dt);

                // 2. RENDERING PIPELINE
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw standard parent environment background (e.g., a parallax grid)
                ctx.strokeStyle = '#313244';
                ctx.lineWidth = 1;
                for (let x = -starsOffset; x < canvas.width; x += 40) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                for (let y = 0; y < canvas.height; y += 40) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }

                // Draw background text showing active render loops
                ctx.fillStyle = '#45475a';
                ctx.font = '12px Courier New';
                ctx.fillText(`Scene update running at ~${Math.round(1 / dt)} FPS`, 15, 25);

                // Render component block relative to determined center position
                popup.draw(ctx, popupX, popupY);

                requestAnimationFrame(loop);
            }

            // Start master canvas loop
            requestAnimationFrame(loop);
        });
    </script>
</body>
</html>
