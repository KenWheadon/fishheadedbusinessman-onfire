<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Component Harness</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #eee;
            font-family: sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        canvas {
            background-color: #1a1a1a;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            border-radius: 12px;
        }
        .controls {
            display: flex;
            gap: 15px;
        }
        .btn-ui {
            padding: 12px 28px;
            font-size: 15px;
            font-weight: bold;
            color: #ffffff;
            background: linear-gradient(135deg, #2196F3 0%, #0d47a1 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
            transition: all 0.2s ease;
        }
        .btn-ui:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.5);
            background: linear-gradient(135deg, #42a5f5 0%, #1565c0 100%);
        }
        .btn-ui:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="controls">
            <button id="resetBtn" class="btn-ui">Reset Component State</button>
        </div>
    </div>

    <!-- Component Source -->
    <script src="StartScreen.js"></script>

    <script>
        // 1. Procedural Global AssetManager setup (Solves local image file resolution issues)
        const AssetManager = {
            assets: {},
            init() {
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = 300;
                tempCanvas.height = 150;
                const ctx = tempCanvas.getContext('2d');
                
                // Draw a sleek game gradient title card
                const grad = ctx.createLinearGradient(0, 0, 300, 150);
                grad.addColorStop(0, '#FF416C');
                grad.addColorStop(1, '#FF4B2B');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.roundRect(0, 0, 300, 150, 20);
                ctx.fill();
                
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 5;
                ctx.stroke();
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 38px sans-serif';
                ctx.shadowColor = 'rgba(0,0,0,0.4)';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetY = 4;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('SUPER GAME', 150, 75);
                
                const img = new Image();
                img.src = tempCanvas.toDataURL();
                this.assets['logo'] = img;
            },
            get(key) {
                return this.assets[key];
            }
        };
        AssetManager.init();

        // 2. Setup Canvas & Dimensions
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Render our component block as a 640x480 container inside our 800x600 canvas
        const compWidth = 640;
        const compHeight = 480;
        const compX = (canvas.width - compWidth) / 2;
        const compY = (canvas.height - compHeight) / 2;

        // 3. Instantiate Component Block (No auto-reset timeouts anymore)
        const startScreen = new StartScreen({
            width: compWidth,
            height: compHeight,
            onPlay: () => {
                console.log('Play sequence finished! Screen is now offscreen.');
            },
            onSettings: () => {
                console.log('Settings menu selected!');
            }
        });

        // 4. Translate Input coordinates into Local Block Space
        function getLocalCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const globalX = e.clientX - rect.left;
            const globalY = e.clientY - rect.top;
            return {
                x: globalX - compX,
                y: globalY - compY
            };
        }

        canvas.addEventListener('mousemove', (e) => {
            const coords = getLocalCoords(e);
            startScreen.handleMouseMove(coords.x, coords.y);
            
            // Manage cursor styling from parent layer dynamically
            const insideLogo = startScreen.isPointInRect(coords.x, coords.y, startScreen.logo);
            const insideBtn = startScreen.buttons.some(b => startScreen.isPointInRect(coords.x, coords.y, b));
            if (startScreen.state === 'ACTIVE' && (insideLogo || insideBtn)) {
                canvas.style.cursor = 'pointer';
            } else {
                canvas.style.cursor = 'default';
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            const coords = getLocalCoords(e);
            startScreen.handleMouseDown(coords.x, coords.y);
        });

        canvas.addEventListener('mouseup', (e) => {
            const coords = getLocalCoords(e);
            startScreen.handleMouseUp(coords.x, coords.y);
        });

        // Bind physical UI Reset button
        document.getElementById('resetBtn').addEventListener('click', () => {
            startScreen.reset();
            console.log('Component successfully reset via API');
        });

        // 5. Parent Application Loop (Feeding Delta Time)
        let lastTime = performance.now();

        function loop(currentTime) {
            const dt = (currentTime - lastTime) / 1000; // in seconds
            lastTime = currentTime;

            // Cap the frame step to prevent massive jumps when switching browser tabs
            const cappedDt = Math.min(dt, 0.1);

            // Clear outside area
            ctx.fillStyle = '#111111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Visual containment wrapper
            ctx.strokeStyle = '#3a3a3a';
            ctx.lineWidth = 2;
            ctx.strokeRect(compX - 4, compY - 4, compWidth + 8, compHeight + 8);
            
            ctx.fillStyle = '#666';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('Modular Component Block Bounds', compX, compY - 12);

            // Call modular update and draw methods
            startScreen.update(cappedDt);
            startScreen.draw(ctx, compX, compY);

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
