<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modular Game Loading Screen Component</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111116;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Container layout mimicking a flex item box block */
    #canvas-container {
      border: 3px dashed #3c3c4a;
      border-radius: 16px;
      padding: 10px;
      background: #16161e;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }

    canvas {
      display: block;
      border-radius: 8px;
      background: #000;
    }

    #test-panel {
      margin-top: 30px;
      background: #1c1c24;
      border: 2px solid #3c3c4a;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn-dev {
      background: #4e4e5a;
      border: none;
      color: #fff;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-dev:hover {
      background: #626272;
      transform: translateY(-1px);
    }

    .btn-dev.start {
      background: #e5c158;
      color: #111;
    }

    .btn-dev.start:hover {
      background: #f3d375;
    }

    .btn-dev.reset {
      background: #c94c4c;
    }

    .btn-dev.reset:hover {
      background: #df5c5c;
    }

    .status-tracker {
      font-size: 14px;
      background: #111;
      padding: 6px 15px;
      border-radius: 20px;
      border: 1px solid #333;
    }

    .status-val {
      font-weight: bold;
      color: #e5c158;
    }
  </style>
</head>
<body>

  <!-- Bounded Flex Mock Container Layout Box -->
  <div id="canvas-container">
    <canvas id="gameCanvas" width="600" height="400"></canvas>
  </div>

  <!-- Interactive Control Panel Matrix -->
  <div id="test-panel">
    <div class="status-tracker">
      API Check -> loader.isOnScreen(): <span id="api-status" class="status-val">true</span>
    </div>
    <div class="btn-row">
      <button onclick="startLoading()" class="btn-dev start">▶️ Start Loader</button>
      <button onclick="setLoading(20)" class="btn-dev">Set to 20%</button>
      <button onclick="setLoading(50)" class="btn-dev">Set to 50%</button>
      <button onclick="setLoading(75)" class="btn-dev">Set to 75%</button>
      <button onclick="setLoading(100)" class="btn-dev" style="background:#44a044">Set to 100%</button>
      <button onclick="resetLoading()" class="btn-dev reset">Reset (0%)</button>
    </div>
  </div>

  <script src="loading.js"></script>
  <script>
    // Global Preloaded Mock Asset Manager Hook Integration
    const AssetManager = {
      assets: {},
      get(key) { return this.assets[key] || null; }
    };

    // Main Canvas Viewport Definitions
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Instantiate decoupled layout block
    const blockWidth = 600;
    const blockHeight = 400;
    const loader = new GameLoader({ width: blockWidth, height: blockHeight });

    // Center positioning parameters within global main scene context
    const offsetX = 0;
    const offsetY = 0;

    // Standardized Input Coordinate Redirection Map Loops
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const globalX = e.clientX - rect.left;
      const globalY = e.clientY - rect.top;

      // Translate coordinates directly to block space relative positions
      const localX = globalX - offsetX;
      const localY = globalY - offsetY;
      loader.handleMouseMove(localX, localY);
    });

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const globalX = e.clientX - rect.left;
      const globalY = e.clientY - rect.top;

      const localX = globalX - offsetX;
      const localY = globalY - offsetY;
      loader.handleMouseClick(localX, localY);
    });

    // Control Panel Trigger Interfaces
    function startLoading() { loader.start(); }
    function setLoading(percent) { loader.setProgress(percent); }
    function resetLoading() { loader.reset(); }

    // Unified Engine Execution Loop
    let lastTime = performance.now();

    function engineLoop(currentTime) {
      // Delta calculation in standard seconds
      let dt = (currentTime - lastTime) / 1000;
      lastTime = currentTime;

      // Protect execution spikes on frame drops/tab backgrounding
      if (dt > 0.1) dt = 0.1;

      // Main Cycle Logic / Graphic Passes
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      loader.update(dt);
      loader.draw(ctx, offsetX, offsetY);

      // System telemetry monitoring update ticks
      const active = loader.isOnScreen();
      const apiStatusDisplay = document.getElementById('api-status');
      apiStatusDisplay.textContent = active ? "TRUE (Visible)" : "FALSE (Off-screen)";
      apiStatusDisplay.style.color = active ? "#e5c158" : "#ff5555";

      requestAnimationFrame(engineLoop);
    }

    // Fire off main engine thread initialization
    requestAnimationFrame(engineLoop);
  </script>
</body>
</html>
