<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular Canvas Engine Test</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #111;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background: radial-gradient(circle, #34495e 0%, #1a252f 100%);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="1024" height="768"></canvas>

    <script src="EndScreenComponent.js"></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Engine-level coordinate variables for where we want to "mount" the block
        // We'll render a 600x600 end screen floating in the center of our 1024x768 game.
        const componentWidth = 600;
        const componentHeight = 600;
        const offsetX = (canvas.width - componentWidth) / 2;
        const offsetY = (canvas.height - componentHeight) / 2;

        // Initialize our pure component
        const endScreen = new EndScreenComponent({
            width: componentWidth,
            height: componentHeight,
            onMainMenu: () => console.log("Engine: Navigating to Main Menu state"),
            onSettings: () => console.log("Engine: Pushing Settings overlay state"),
            onCredits:  () => console.log("Engine: Transitioning to Credits state")
        });

        // --- GLOBAL INPUT HANDLING & COORDINATE TRANSLATION ---
        
        function getLocalMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            // Scale mouse coordinates in case CSS scales the canvas
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const canvasX = (evt.clientX - rect.left) * scaleX;
            const canvasY = (evt.clientY - rect.top) * scaleY;

            // Translate into local component space
            return {
                localX: canvasX - offsetX,
                localY: canvasY - offsetY
            };
        }

        canvas.addEventListener('mousemove', (e) => {
            const { localX, localY } = getLocalMousePos(e);
            
            // Only send input if within the component's bounding box
            if (localX >= 0 && localX <= componentWidth && localY >= 0 && localY <= componentHeight) {
                const wantsPointer = endScreen.handleMouseMove(localX, localY);
                canvas.style.cursor = wantsPointer ? 'pointer' : 'default';
            } else {
                // Mouse is outside component
                endScreen.handleMouseMove(-1, -1); // Force clear hovers
                canvas.style.cursor = 'default';
            }
        });

        canvas.addEventListener('click', (e) => {
            const { localX, localY } = getLocalMousePos(e);
            
            if (localX >= 0 && localX <= componentWidth && localY >= 0 && localY <= componentHeight) {
                endScreen.handleMouseClick(localX, localY);
            }
        });

        // --- THE MASTER GAME LOOP ---
        
        let lastTime = performance.now();

        function gameLoop(currentTime) {
            // Calculate Delta Time (dt)
            const dt = currentTime - lastTime;
            lastTime = currentTime;

            // 1. UPDATE STATE
            endScreen.update(dt);

            // 2. CLEAR ENGINE CANVAS
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 3. DRAW COMPONENTS
            // Here you would draw your game world first...
            
            // Then draw UI layers on top, passing the desired offset
            endScreen.draw(ctx, offsetX, offsetY);

            // For debugging: Draw a bounding box showing where the component lives
            ctx.strokeStyle = 'rgba(255, 0, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(offsetX, offsetY, componentWidth, componentHeight);

            requestAnimationFrame(gameLoop);
        }

        // Start the engine
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
