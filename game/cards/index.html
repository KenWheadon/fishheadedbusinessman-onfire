<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match & Evade Card Component</title>
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #151d30;
      --accent-color: #fbbf24;
      --text-color: #f8fafc;
      --border-color: #334155;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2rem;
      margin: 0 0 0.5rem 0;
      letter-spacing: 1px;
      background: linear-gradient(to right, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #94a3b8;
      margin: 0;
    }

    .game-container {
      width: 90vw;
      max-width: 800px;
      aspect-ratio: 16 / 9;
      position: relative;
      border: 4px solid var(--border-color);
      border-radius: 16px;
      background: radial-gradient(circle, #1e1b4b 0%, #0f172a 100%);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .controls-panel {
      margin-top: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
      background-color: var(--card-bg);
      padding: 1rem 2rem;
      border-radius: 12px;
      border: 1px solid var(--border-color);
    }

    .btn-reset {
      background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
      color: #0f172a;
      border: none;
      padding: 0.75rem 1.5rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
    }

    .btn-reset:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(251, 191, 36, 0.5);
    }

    .btn-reset:active {
      transform: translateY(0);
    }

    .api-monitor {
      display: flex;
      gap: 1.5rem;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .monitor-item span {
      font-family: monospace;
      font-weight: bold;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background-color: #0f172a;
    }

    .value-true { color: #10b981; }
    .value-false { color: #ef4444; }
  </style>
</head>
<body>
  <header>
    <h1>Match & Survive</h1>
    <p>Flip cards to find a pair. Avoid the skull!</p>
  </header>

  <div class="game-container">
    <canvas id="cardGameCanvas"></canvas>
  </div>

  <div class="controls-panel">
    <button class="btn-reset" id="resetBtn">Shuffle & Deal</button>
    
    <div class="api-monitor">
      <div class="monitor-item">
        gameEnd(): <span id="gameEndVal" class="value-false">false</span>
      </div>
      <div class="monitor-item">
        didWin(): <span id="didWinVal" class="value-false">false</span>
      </div>
    </div>
  </div>

  <!-- Import the separated JS component -->
  <script src="./cardGame.js"></script>
  
  <!-- External Controller, Routing and UI Bridge -->
  <script>
    const canvas = document.getElementById('cardGameCanvas');
    const ctx = canvas.getContext('2d');

    // Establish sizing constraints
    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
    }
    resizeCanvas();

    // Instantiate modular component using standard block dimension bounds
    const game = new CardGame({ width: canvas.width, height: canvas.height });

    // Ensure resizing handles dynamic width/height constraints
    window.addEventListener('resize', () => {
      resizeCanvas();
      game.width = canvas.width;
      game.height = canvas.height;
      game.scaleX = game.width / game.baseWidth;
      game.scaleY = game.height / game.baseHeight;
    });

    // Helper: Translate event offset space to localized client coordinates
    function getLocalCoords(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        localX: e.clientX - rect.left,
        localY: e.clientY - rect.top
      };
    }

    // Input router
    canvas.addEventListener('mousemove', (e) => {
      const { localX, localY } = getLocalCoords(e);
      const isHovering = game.handleMouseMove(localX, localY);
      canvas.style.cursor = isHovering ? 'pointer' : 'default';
    });

    canvas.addEventListener('mousedown', (e) => {
      const { localX, localY } = getLocalCoords(e);
      game.handleMouseClick(localX, localY);
    });

    // Trigger Game Loop with precision high-res timestamp
    let lastTime = performance.now();

    function renderLoop(now) {
      const dt = (now - lastTime) / 1000; // Delta time in seconds
      lastTime = now;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Execute decoupled update and render sequence (Offset positioned at 0, 0)
      game.update(dt);
      game.draw(ctx, 0, 0);

      requestAnimationFrame(renderLoop);
    }
    
    // Seed initial timer and launch render thread
    requestAnimationFrame((timestamp) => {
      lastTime = timestamp;
      requestAnimationFrame(renderLoop);
    });

    // UI State Monitors
    const resetBtn = document.getElementById('resetBtn');
    const gameEndVal = document.getElementById('gameEndVal');
    const didWinVal = document.getElementById('didWinVal');

    resetBtn.addEventListener('click', () => {
      game.reset();
    });

    function monitorAPI() {
      const ended = game.gameEnd();
      const won = game.didWin();

      gameEndVal.textContent = ended.toString();
      gameEndVal.className = ended ? 'value-true' : 'value-false';

      didWinVal.textContent = won.toString();
      didWinVal.className = won ? 'value-true' : 'value-false';

      requestAnimationFrame(monitorAPI);
    }
    monitorAPI();
  </script>
</body>
</html>
