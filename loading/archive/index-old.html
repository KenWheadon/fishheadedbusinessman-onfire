<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Component Wrapper</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
            overflow: hidden;
        }
        
        /* The game canvas boundaries */
        canvas {
            background-color: #111;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            border: 1px solid #333;
        }

        /* Test UI - safe to delete in production */
        .dev-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
        }

        button {
            padding: 8px 12px;
            margin-right: 5px;
            cursor: pointer;
            background: #222;
            color: #00f3ff;
            border: 1px solid #00f3ff;
            border-radius: 4px;
            font-weight: bold;
        }

        button:hover {
            background: #00f3ff;
            color: #000;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div class="dev-controls">
        <button onclick="loader.start()">start()</button>
        <button onclick="loader.update(loader.progress + 0.2)">update(+20%)</button>
        <button onclick="loader.loaded()">loaded()</button>
        <button onclick="checkStatus()">isoffscreen()?</button>
        <button onclick="loader.reset()">reset()</button>
    </div>

    <script src="LoadingScreen.js"></script>

    <script>
        const loader = new LoadingScreen('gameCanvas');

        // Helper strictly for the dev testing rig
        function checkStatus() {
            alert('Off Screen Boolean: ' + loader.isoffscreen());
        }
    </script>

</body>
</html>
