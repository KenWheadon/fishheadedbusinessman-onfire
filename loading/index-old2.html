<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Loading Screen Component</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111116;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Dev control panel styling */
    #test-panel {
      position: absolute;
      bottom: 40px;
      background: #1c1c24;
      border: 2px solid #3c3c4a;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      z-index: 9999;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .btn-dev {
      background: #4e4e5a;
      border: none;
      color: #fff;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-dev:hover {
      background: #626272;
      transform: translateY(-1px);
    }

    .btn-dev.start {
      background: #e5c158;
      color: #111;
    }

    .btn-dev.start:hover {
      background: #f3d375;
    }

    .btn-dev.reset {
      background: #c94c4c;
    }

    .btn-dev.reset:hover {
      background: #df5c5c;
    }
  </style>
</head>
<body>

  <!-- The Loading Screen will inject itself here -->

  <!-- Interactive Test Panel -->
  <div id="test-panel">
    <button onclick="startLoading()" class="btn-dev start">▶️ Start Loader</button>
    <button onclick="setLoading(20)" class="btn-dev">Set to 20%</button>
    <button onclick="setLoading(50)" class="btn-dev">Set to 50%</button>
    <button onclick="setLoading(75)" class="btn-dev">Set to 75%</button>
    <button onclick="setLoading(100)" class="btn-dev" style="background:#44a044">Set to 100%</button>
    <button onclick="resetLoading()" class="btn-dev reset">Reset (0%)</button>
  </div>

  <script src="loading.js"></script>
  <script>
    // Initialize loading screen
    // You can pass a path to your own logo here: new GameLoader('images/my_logo.png')
    const loader = new GameLoader('images/logo.png');

    // Button event handlers
    function startLoading() {
      loader.start();
    }

    function setLoading(percent) {
      loader.setProgress(percent);
    }

    function resetLoading() {
      loader.reset();
    }
  </script>
</body>
</html>
