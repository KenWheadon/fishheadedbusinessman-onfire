<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Debt Component Mount</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Responsive layout block mimicking a layout item */
        .game-component-wrapper {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 21 / 9;
            background-color: #11141a;
            border: 3px solid #334155;
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .controls {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background-color: #1e293b;
            color: #f8fafc;
            border: 1px solid #475569;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        button:hover {
            background-color: #334155;
            border-color: #64748b;
        }

        button.pay-btn {
            background-color: #15803d;
            border-color: #16a34a;
        }
        button.pay-btn:hover {
            background-color: #166534;
        }

        button.lost-btn {
            background-color: #b91c1c;
            border-color: #dc2626;
        }
        button.lost-btn:hover {
            background-color: #991b1b;
        }
    </style>
</head>
<body>

    <div class="game-component-wrapper">
        <canvas id="debtCanvas"></canvas>
    </div>

    <div class="controls">
        <button class="pay-btn" onclick="gameDebt.pay()">Pay $25k</button>
        <button class="lost-btn" onclick="gameDebt.lost()">Trigger 'Lost'</button>
        <button onclick="gameDebt.reset()">Reset System</button>
    </div>

    <!-- Include Component Logic -->
    <script src="DebtComponent.js"></script>
    <script>
        const canvas = document.getElementById('debtCanvas');
        const ctx = canvas.getContext('2d');

        // Internal rendering resolution
        const COMPONENT_WIDTH = 840;
        const COMPONENT_HEIGHT = 360;

        // Set fixed buffer resolution
        canvas.width = COMPONENT_WIDTH;
        canvas.height = COMPONENT_HEIGHT;

        // Initialize decoupled game module
        const gameDebt = new DebtComponent({
            width: COMPONENT_WIDTH,
            height: COMPONENT_HEIGHT
        });

        // Translate global screen coordinates to component space bounds
        function getLocalCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        // Input Observers
        canvas.addEventListener('mousemove', (e) => {
            const coords = getLocalCoordinates(e);
            gameDebt.handleMouseMove(coords.x, coords.y);
            
            // Dynamic UI Feedback (Changes pointer style when hovering text box)
            canvas.style.cursor = gameDebt.isHoveringButton ? 'pointer' : 'default';
        });

        canvas.addEventListener('click', (e) => {
            const coords = getLocalCoordinates(e);
            gameDebt.handleMouseClick(coords.x, coords.y);
        });

        // Setup decoupled game loop orchestrator
        let lastTime = performance.now();

        function orchestrator(now) {
            const dt = (now - lastTime) / 1000; // Calculate accurate delta time in seconds
            lastTime = now;

            // Clear entire screen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update state engine & render
            gameDebt.update(dt);
            gameDebt.draw(ctx, 0, 0); // Rendered cleanly at offset 0,0

            requestAnimationFrame(orchestrator);
        }

        requestAnimationFrame((timestamp) => {
            lastTime = timestamp;
            requestAnimationFrame(orchestrator);
        });
    </script>
</body>
</html>
