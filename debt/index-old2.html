<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Debt Component Mount</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Responsive 16:9 Aspect Ratio Container */
        .game-component-wrapper {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9;
            background-color: #11141a;
            border: 3px solid #334155;
            border-radius: 8px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Styling for standard controller setup below game window */
        .controls {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background-color: #1e293b;
            color: #f8fafc;
            border: 1px solid #475569;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #334155;
            border-color: #64748b;
        }

        button.pay-btn {
            background-color: #15803d;
            border-color: #16a34a;
        }
        button.pay-btn:hover {
            background-color: #166534;
        }

        button.lost-btn {
            background-color: #b91c1c;
            border-color: #dc2626;
        }
        button.lost-btn:hover {
            background-color: #991b1b;
        }
    </style>
</head>
<body>

    <!-- The 16:9 Component Container -->
    <div class="game-component-wrapper">
        <canvas id="debtCanvas"></canvas>
    </div>

    <!-- Testing Suite controls to interact with Class APIs -->
    <div class="controls">
        <button class="pay-btn" onclick="gameDebt.pay()">Pay $25k</button>
        <button class="lost-btn" onclick="gameDebt.lost()">Trigger 'Lost'</button>
        <button onclick="gameDebt.reset()">Reset System</button>
    </div>

    <!-- Include Component Logic -->
    <script src="DebtComponent.js"></script>
    <script>
        // Mount and initialize instance of the class inside application
        const gameDebt = new DebtComponent('debtCanvas');
    </script>
</body>
</html>
