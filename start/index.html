<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Start Screen</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            background-color: #2b2b2b;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script src="StartScreen.js"></script>
    <script>
        // Initialize the component
        const startScreen = new StartScreen('gameCanvas', {
            onHelp: () => console.log('Help menu triggered!'),
            onSettings: () => console.log('Settings menu triggered!')
        });
    </script>
</body>
</html>
